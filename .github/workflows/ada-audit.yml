name: ADA Accessibility Audit

on:
  push:
    branches: [main]
  deployment_status:

jobs:
  ada-audit:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'deployment_status' && github.event.deployment_status.state == 'success')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pa11y
        run: npm install -g pa11y pa11y-reporter-json

      - name: Run ADA audit on key pages
        run: |
          BASE_URL="https://emlakie.com"
          PAGES=(
            "/"
            "/rentals"
            "/login"
            "/landlords"
            "/privacy"
            "/terms"
          )

          mkdir -p ada-reports
          FAILED=false

          for PAGE in "${PAGES[@]}"; do
            echo "Auditing $BASE_URL$PAGE..."
            pa11y "$BASE_URL$PAGE" \
              --standard WCAG2AA \
              --reporter json \
              --timeout 30000 \
              --wait 2000 \
              > "ada-reports/$(echo $PAGE | tr '/' '_').json" || FAILED=true
          done

          if [ "$FAILED" = true ]; then
            echo "ADA violations found — see artifacts for details"
            exit 1
          fi

      - name: Upload ADA reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ada-audit-reports
          path: ada-reports/
          retention-days: 30
