name: Uptime Monitor

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:          # allow manual trigger

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check emlakie.com
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://emlakie.com)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::emlakie.com returned $STATUS — site may be down!"
            exit 1
          fi

      - name: Check /landlord/login
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://emlakie.com/landlord/login)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::/landlord/login returned $STATUS"
            exit 1
          fi

      - name: Check /rentals
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://emlakie.com/rentals)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::/rentals returned $STATUS"
            exit 1
          fi
